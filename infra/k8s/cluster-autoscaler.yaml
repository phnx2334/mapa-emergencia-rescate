# Cluster Autoscaler (Hetzner cloud provider) — escala NODOS (VPS efímeros).
# Corre DENTRO de k3s como un pod. Vigila pods Pending → llama a la API de
# Hetzner para crear un VPS → cloud-init lo une a k3s → los pods se programan.
# Al quedar un nodo vacío y sin uso por un tiempo, lo drena y lo DESTRUYE.
#
# MODELO TOTALMENTE EFÍMERO: no hay workers fijos en tofu (k3s_worker_count=0).
# El CA es dueño de TODOS los workers vía su pool `--nodes=<min>:<max>:...`.
# `min` se MANTIENE como piso (siempre >= min workers vivos).
#
# Arranque seguro (chicken-and-egg): el CA corre en el MASTER (control-plane,
# siempre encendido), así que funciona incluso con 0 workers — puede crear el
# primero. nodeSelector + toleration lo fijan al master.
#
# Versionado: el CA va POR DETRÁS del minor de k8s (sus releases salen después).
# Cluster en v1.36, pero v1.36.x AÚN NO está publicada en registry.k8s.io (el
# último tag es v1.35.0) → usamos v1.35.0. Correr el CA un minor por debajo del
# clúster es el skew soportado oficialmente. Regla: usa el v1.<N>.x más alto
# PUBLICADO con N <= minor del clúster; bumpear cuando salga v1.36.x.
# (Pinear v1.36.0 daba ImagePullBackOff: "not found" — ese tag nunca existió.)
#
# Config de Hetzner (HCLOUD_TOKEN, HCLOUD_CLUSTER_CONFIG, red/firewall/ssh) se
# inyecta vía el Secret `cluster-autoscaler-hcloud`, que CREA el workflow de
# deploy a partir de los GitHub secrets + el cloud-init de k3s-agent (NO se
# commitea ningún secreto aquí). Ver deploy-hetzner.yml.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app: cluster-autoscaler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-autoscaler
  labels:
    app: cluster-autoscaler
rules:
  - apiGroups: [""]
    resources: ["events", "endpoints"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["endpoints"]
    resourceNames: ["cluster-autoscaler"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["watch", "list", "get", "update"]
  - apiGroups: [""]
    resources:
      ["namespaces", "pods", "services", "replicationcontrollers", "persistentvolumeclaims", "persistentvolumes"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["batch", "extensions"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["watch", "list"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "replicasets", "statefulsets"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes", "csidrivers", "csistoragecapacities", "volumeattachments"]
    verbs: ["watch", "list", "get"]
  # Dynamic Resource Allocation (API group resource.k8s.io, GA en k8s 1.34+). El
  # CA 1.3x sincroniza informers de ESTOS al arrancar y BLOQUEA en "blocking until
  # caches are synced" (main.go:288) hasta que listen. Sin este grant el watch da
  # "forbidden", la caché nunca sincroniza y el loop de autoscaling NUNCA arranca:
  # el pod queda 1/1 Running, 0 restarts (parece sano) pero no registra el node
  # group ni crea VPS. Es la causa raíz de "no hay nodos efímeros". DEBE estar
  # mientras el CA corra contra un clúster >=1.34. Al bumpear el CA, re-verifica
  # contra el cluster-autoscaler-clusterrole.yaml upstream del minor objetivo.
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceslices", "resourceclaims", "deviceclasses"]
    verbs: ["watch", "list", "get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["list", "watch", "get", "create", "delete", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "update", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-autoscaler
  labels:
    app: cluster-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: cluster-autoscaler
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app: cluster-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-autoscaler
  template:
    metadata:
      labels:
        app: cluster-autoscaler
      annotations:
        # El propio CA no debe ser desalojado por un scale-down que él mismo
        # decide (corre en el master de todos modos, pero defensa extra).
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      serviceAccountName: cluster-autoscaler
      priorityClassName: system-cluster-critical
      # --- Fijar al MASTER (control-plane, siempre vivo) ---
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cluster-autoscaler
          # Último tag PUBLICADO (CA va por detrás de k8s; v1.36.x aún no existe).
          # Skew soportado: CA un minor por debajo del clúster v1.36.
          image: registry.k8s.io/autoscaling/cluster-autoscaler:v1.35.0
          command:
            - ./cluster-autoscaler
            - --cloud-provider=hetzner
            - --stderrthreshold=info
            - --v=2
            # Pool de workers EFÍMEROS: min:max:tipo:región:nombre.
            # min=2 -> piso siempre vivo. max=15 -> techo de ráfaga para picos
            # mediáticos worldwide (cx23 = 2vCPU/4GB). Subido de 5 a 15: a max-HPA
            # (api 30 + web 20 + admin 6 pods) hacen falta más de 5 nodos. OJO: cada
            # nodo cuesta € y cuenta contra la cuota de servidores de Hetzner —
            # verifica el límite del proyecto antes de un evento grande.
            - --nodes=2:15:cx23:hel1:mapa-pool
            # IMPRESCINDIBLE para el modelo SIN workers fijos. El default del CA es
            # REACTIVO: solo crea nodos cuando hay pods Pending; un `min` en --nodes
            # NO se materializa solo (verificado en flags.go: el flag default=false,
            # y en orchestrator.go ScaleUpToNodeGroupMinSize hace MinSize-targetSize
            # incluso desde 0). Sin esto, el pool se queda en 0 con min=2 (se vio en
            # el log: "Set node group mapa-pool size from 0 to 0") → si no hay tráfico
            # y no hay workers fijos, el clúster queda con CERO workers. Con esto el
            # CA sube el pool a 2 PROACTIVAMENTE (sin pods Pending), así el piso es
            # auto-reparable y la migración a efímero no necesita drenar primero para
            # forzar el arranque del piso.
            - --enforce-node-group-min-size=true
            # --- guardrails de scale-down ---
            # Espera 10 min de baja utilización antes de retirar un nodo (evita
            # flapping y dar tiempo a drenar).
            - --scale-down-unneeded-time=10m
            - --scale-down-delay-after-add=10m
            - --scale-down-utilization-threshold=0.5
            # Permite retirar nodos aunque corran pods con almacenamiento local
            # efímero (nuestros pods no usan PVCs locales; sin esto, los pods de
            # kube-system con emptyDir bloquearían TODO scale-down).
            - --skip-nodes-with-local-storage=false
            # No retires nodos con pods de kube-system (coredns, etc.) salvo que
            # puedan reprogramarse — protege servicios del sistema.
            - --skip-nodes-with-system-pods=true
            # Expander: al necesitar un nodo, elige el pool más barato (solo hay
            # uno, pero explícito por claridad).
            - --expander=least-waste
            - --balance-similar-node-groups=false
          env:
            # Token de Hetzner + config del pool (cloud-init/red/firewall/ssh),
            # del Secret que crea el workflow. NO commitear secretos.
            - name: HCLOUD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cluster-autoscaler-hcloud
                  key: token
            - name: HCLOUD_CLUSTER_CONFIG
              valueFrom:
                secretKeyRef:
                  name: cluster-autoscaler-hcloud
                  key: cluster-config
            - name: HCLOUD_NETWORK
              value: "mapa-net"
            - name: HCLOUD_FIREWALL
              value: "mapa-db-fw"
            - name: HCLOUD_SSH_KEY
              value: "mapa-key"
            # IP pública ON: igual que los workers actuales (no hay NAT gateway,
            # y los nodos necesitan egress para instalar k3s [get.k3s.io] y bajar
            # imágenes [registry.k8s.io, ghcr.io]). El tráfico a DB/Valkey sigue
            # yendo por la red privada. El firewall mapa-db-fw solo abre 22/6443
            # al público; nada más queda expuesto.
            - name: HCLOUD_PUBLIC_IPV4
              value: "true"
            - name: HCLOUD_PUBLIC_IPV6
              value: "false"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
