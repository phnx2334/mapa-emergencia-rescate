# Métricas a NIVEL DE CLUSTER (método USE + señales de saturación), que el app
# metrics (RED) no da: nodos (CPU/RAM/disco/red) y objetos k8s (pods, réplicas,
# HPA, restarts, OOMKilled, CrashLoopBackOff, pending). Las scrapea Alloy por las
# annotations prometheus.io/* y las empuja al command center.
#
#   - node-exporter (DaemonSet): métricas del SO de cada nodo -> "cuánto room
#     queda" (node_cpu_*, node_memory_*, node_filesystem_*, node_network_*).
#   - kube-state-metrics (Deployment): estado de los objetos k8s
#     (kube_pod_*, kube_deployment_*, kube_horizontalpodautoscaler_*, ...).
# Dashboards comunidad recomendados: 1860 (node-exporter), 13332 (kube-state).
---
# ===================== node-exporter (DaemonSet) =====================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: mapa
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: /metrics
    spec:
      hostNetwork: true
      hostPID: true
      # Corre en TODOS los nodos (incluido master) para no tener puntos ciegos.
      tolerations:
        - operator: Exists
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args:
            - --path.rootfs=/host/root
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            # Excluye filesystems virtuales para no inflar series.
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
          ports:
            - containerPort: 9100
              name: metrics
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              memory: "64Mi"
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
---
# ================= kube-state-metrics (Deployment + RBAC) =================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: mapa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
  - apiGroups: [""]
    resources:
      ["configmaps", "secrets", "nodes", "pods", "services", "serviceaccounts",
       "resourcequotas", "replicationcontrollers", "limitranges",
       "persistentvolumeclaims", "persistentvolumes", "namespaces", "endpoints"]
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "daemonsets", "deployments", "replicasets"]
    verbs: ["list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: mapa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: mapa
  labels:
    app: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.14.0
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: telemetry
          resources:
            requests:
              cpu: "20m"
              memory: "64Mi"
            limits:
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 5
