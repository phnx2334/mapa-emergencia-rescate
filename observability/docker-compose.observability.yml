# Stack de OBSERVABILIDAD (command center) — Prometheus + Loki + Grafana + Caddy.
#
# Corre en su PROPIO VPS dedicado (167.233.197.13), AISLADO del cluster y de
# staging: el monitor no debe morir ni competir por recursos con lo que vigila
# (best practice estándar). Todo el stack vive en este folder.
#
# RECEPTOR de telemetría: el cluster k3s de prod EMPUJA (push) métricas y logs
# aquí vía Grafana Alloy (remote_write + loki push) sobre HTTPS con bearer token.
# NO scrapea el cluster (nodos efímeros, sin IP estable, otra red): solo recibe.
#
# Caddy propio termina TLS (Let's Encrypt) y enruta los 3 dominios. Prometheus y
# Loki NO publican puertos al host: solo se llega a ellos por la red interna a
# través de Caddy (que además gatea el push con bearer token). Grafana tampoco
# publica puertos: Caddy lo sirve.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Bearer token que gatea los endpoints de push (prom/loki). Viene de
      # .observability.env. Lo usa también Alloy en k3s (mismo valor).
      OBS_PUSH_TOKEN: ${OBS_PUSH_TOKEN:?Falta OBS_PUSH_TOKEN}
    volumes:
      - ./Caddyfile.observability:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [obs_net]
    depends_on:
      - grafana
      - prometheus
      - loki

  # --- Prometheus: almacén de métricas + RECEPTOR de remote_write ---
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Habilita /api/v1/write para que Alloy (k3s) pueda EMPUJAR.
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=8GB"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [obs_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Loki: almacén de logs + RECEPTOR de push (/loki/api/v1/push) ---
  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks: [obs_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  # --- Grafana: la UI que abres (dashboards + alertas) ---
  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Falta GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana-observability.terremotovenezuela.app}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-grafana-observability.terremotovenezuela.app}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks: [obs_net]
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  obs_net:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  caddy_data:
  caddy_config:
