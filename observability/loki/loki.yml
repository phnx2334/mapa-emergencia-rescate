# Loki del command center — RECEPTOR de logs empujados por Alloy desde k3s.
# Single-binary, filesystem store (suficiente para pocos usuarios). Adaptado del
# loki.yml de boahaus, con límites de ingesta y retención acotados al VPS chico.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095

common:
  ring:
    kvstore:
      store: inmemory
    instance_addr: 127.0.0.1
  replication_factor: 1
  path_prefix: /loki/data

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks

# Límites: protegen el disco/RAM del VPS compartido. Retención 15d (igual que
# Prometheus) y topes de ingesta para que un pico de logs no llene el disco.
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  retention_period: 360h # 15 días
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  max_streams_per_user: 5000
  max_label_names_per_series: 30
  # Evita explosión de cardinalidad por etiquetas dinámicas (p.ej. ids/IPs).
  max_global_streams_per_user: 5000

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_cancel_period: 10m
  compaction_interval: 10m

# Loki >=3 exige declarar el límite de retención por defecto.
table_manager:
  retention_deletes_enabled: true
  retention_period: 360h
