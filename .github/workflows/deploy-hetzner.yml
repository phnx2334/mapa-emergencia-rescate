# Deploy to Hetzner (k3s).
#
# Manually triggered (workflow_dispatch), same convention as boahaus/argo.
#   action=plan   -> build the image, push to GHCR, but DON'T touch the cluster.
#   action=deploy -> build+push, then roll the app (zero-downtime) via kubectl.
#   ensure_cluster=true -> create the k3s cluster first if it doesn't exist.
#   provision_confirm="apply-infra" -> provision the stateful tier via OpenTofu
#     (private net, firewall, Postgres VPS+volume+DBs, Valkey VPS) + the cluster,
#     then PRINT the DATABASE_URL/VALKEY_URL outputs to paste back as secrets.
#
# Zero-downtime is enforced by the manifests (maxUnavailable:0 + readinessProbe
# /api/readyz) and confirmed here by `kubectl rollout status`, which blocks
# until the new pods are Ready and the old ones drained — or fails the deploy.
name: Deploy to Hetzner (k3s)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        default: plan
        options:
          - plan      # build + push image only; no cluster changes
          - deploy    # build + push, then roll the app
      ensure_cluster:
        description: "Create the k3s cluster if it doesn't exist yet"
        type: boolean
        default: false
      provision_confirm:
        description: "Provision stateful tier via OpenTofu — type apply-infra to run tofu apply (network, firewall, Postgres, Valkey)"
        type: string
        default: ""

permissions:
  contents: read
  packages: write       # push images to GHCR
  deployments: write    # GitHub Deployments / ledger (later)

# IMAGE is computed at runtime (lowercased) — GHCR/Docker require all-lowercase
# repository names and ${{ github.repository }} can contain uppercase (the owner
# "ArturoRiosMock" does). See the "Compute image name" step.

jobs:
  deploy:
    name: Build & ${{ inputs.action }}
    runs-on: ubuntu-latest
    # Repo-level secrets (no GitHub Environment configured). Add
    # `environment: production` here later if you want reviewer gates.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute image name (lowercase)
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Show inputs
        run: |
          echo "action         = ${{ inputs.action }}"
          echo "ensure_cluster = ${{ inputs.ensure_cluster }}"
          echo "image          = ${{ env.IMAGE }}:${{ github.sha }}"
          echo "actor          = ${{ github.actor }}"

      # ---------------------------------------------------------------
      # 1. Build the immutable app image and push to GHCR, tagged :<sha>
      #    (+ :latest for convenience). Runs for BOTH plan and deploy so a
      #    plan still proves the build is green.
      # ---------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # actor can be uppercase; GHCR login is case-insensitive but lowercase
          # is safest.
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Plan stops here
        if: ${{ inputs.action == 'plan' }}
        run: |
          echo "PLAN complete — image built & pushed, cluster untouched."
          echo "Run again with action=deploy to roll it out."

      # ---------------------------------------------------------------
      # 2. (deploy only) Ensure cluster, then roll.
      # ---------------------------------------------------------------
      - name: Install hcloud + kubectl + tofu
        if: ${{ inputs.action == 'deploy' || inputs.provision_confirm == 'apply-infra' }}
        run: |
          # kubectl
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m0755 kubectl /usr/local/bin/kubectl
          # hcloud CLI
          curl -sL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz | tar xz
          sudo install -m0755 hcloud /usr/local/bin/hcloud
          # OpenTofu
          curl -sL https://get.opentofu.org/install-opentofu.sh -o install-opentofu.sh
          chmod +x install-opentofu.sh && sudo ./install-opentofu.sh --install-method standalone
          kubectl version --client && tofu version

      # ---------------------------------------------------------------
      # Provision the stateful tier (PETS) with OpenTofu. Armed only when
      # provision_confirm == "apply-infra". State lives in Hetzner Object
      # Storage (infra/tofu/backend.tf); prevent_destroy guards the DB. After a
      # successful apply, paste the printed DATABASE_URL/VALKEY_URL secrets.
      # This is idempotent — safe to re-run; it only changes drift.
      # ---------------------------------------------------------------
      - name: Provision stateful tier (tofu apply)
        if: ${{ inputs.provision_confirm == 'apply-infra' }}
        working-directory: infra/tofu
        env:
          # S3 backend creds (Hetzner Object Storage) — the S3 backend reads the
          # AWS_* names even though it's Hetzner.
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          # Tofu variables.
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_postgres_user: ${{ secrets.POSTGRES_USER }}
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_postgres_app_db: ${{ secrets.POSTGRES_APP_DB }}
          TF_VAR_postgres_imported_db: ${{ secrets.POSTGRES_IMPORTED_DB }}
          TF_VAR_valkey_password: ${{ secrets.VALKEY_PASSWORD }}
        run: |
          set -euo pipefail
          # -lockfile=readonly: CI must use the committed .terraform.lock.hcl as-is
          # and FAIL if it doesn't match — never silently update it. The lock is
          # generated/updated locally and reviewed in PRs (best practice).
          tofu init -input=false -lockfile=readonly
          tofu apply -input=false -auto-approve
          echo "::notice::Provision done. Set these repo secrets from the outputs below:"
          echo "  DATABASE_URL          = $(tofu output -raw database_url)"
          echo "  IMPORTED_DATABASE_URL = $(tofu output -raw imported_database_url)"
          echo "  VALKEY_URL            = $(tofu output -raw valkey_url)"
          echo "Postgres private IP: $(tofu output -raw postgres_private_ip)"
          echo "Valkey   private IP: $(tofu output -raw valkey_private_ip)"
      # ╔═══════════════════════════════════════════════════════════════════╗
      # ║  >>> NUKE AFTER FIRST RUN — END one-time stateful bootstrap <<<     ║
      # ╚═══════════════════════════════════════════════════════════════════╝

      - name: Ensure cluster exists
        if: ${{ (inputs.action == 'deploy' && inputs.ensure_cluster) || inputs.provision_confirm == 'apply-infra' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          # hetzner-k3s names cluster nodes mapa-master-* / mapa-app-*. Skip the
          # DB/Valkey servers (also mapa-*) by matching the role suffixes.
          if hcloud server list -o noheader -o columns=name | grep -qE '^mapa-(master|app|pool)'; then
            echo "Cluster 'mapa' already present — skipping create."
          else
            echo "No cluster found — creating with hetzner-k3s..."
            docker run --rm \
              -e HCLOUD_TOKEN="$HCLOUD_TOKEN" \
              -v "$PWD/infra:/infra" -v "$HOME/.ssh:/root/.ssh:ro" \
              vitobotta/hetzner-k3s:latest create --config /infra/cluster.yaml
            echo "::notice::Cluster created. Set KUBECONFIG secret: base64 -w0 infra/kubeconfig"
          fi

      - name: Configure kubectl
        # `secrets` can't be used in an `if:` expression, so gate on action only
        # and check KUBECONFIG presence in shell (mapped to an env var). On the
        # FIRST bootstrap run the secret won't exist yet — the step no-ops and
        # tells you to set it, then a normal deploy run uses it.
        if: ${{ inputs.action == 'deploy' }}
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "::warning::KUBECONFIG secret not set yet — skipping kubectl config."
            echo "Set it (base64 -w0 infra/kubeconfig) then re-run action=deploy."
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl get nodes

      - name: Apply manifests
        if: ${{ inputs.action == 'deploy' }}
        run: |
          set -euo pipefail
          # Skip cleanly if kubectl isn't configured (KUBECONFIG not set yet on a
          # first bootstrap run) — the previous step already warned.
          [ -f "$HOME/.kube/config" ] || { echo "No kubeconfig — skipping apply."; exit 0; }
          # Namespace + Service (LB). Deployment is applied then image-pinned.
          kubectl apply -f infra/k8s/service.yaml
          kubectl apply -f infra/k8s/deployment.yaml

      - name: Roll to the new image (zero-downtime)
        if: ${{ inputs.action == 'deploy' }}
        run: |
          set -euo pipefail
          [ -f "$HOME/.kube/config" ] || { echo "No kubeconfig — skipping roll."; exit 0; }
          kubectl -n mapa set image deployment/app \
            app=${{ env.IMAGE }}:${{ github.sha }}
          # Blocks until new pods are Ready (passed /api/readyz) and old pods
          # drained. Fails the job (and the deploy) if the roll stalls.
          kubectl -n mapa rollout status deployment/app --timeout=300s

      - name: Rollback hint on failure
        if: ${{ failure() && inputs.action == 'deploy' }}
        run: |
          echo "::warning::Roll failed. To revert: kubectl -n mapa rollout undo deployment/app"

      - name: Done
        run: echo "✅ ${{ inputs.action }} finished."
